<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to HTML</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 50px auto; background: #1a1a1a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #00ff88; margin-bottom: 20px; }
        
        /* Кнопка Google */
        .google-btn { background: #fff; color: #000; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .google-btn:hover { background: #ccc; }

        input[type="file"] { margin: 20px 0; color: #888; }
        
        .btn { background: #00ff88; color: #000; border: none; padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #00cc6e; transform: translateY(-2px); }
        .btn:disabled { background: #444; cursor: not-allowed; }

        #resultCode { width: 100%; height: 100px; background: #000; color: #00ff88; border: 1px solid #00ff88; border-radius: 8px; padding: 10px; margin-top: 20px; display: none; font-family: monospace; resize: none; box-sizing: border-box; }
        .copy-btn { background: #4285F4; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 8px; margin-top: 10px; width: 100%; display: none; }
        
        #loader { display: none; margin-top: 10px; color: #00ff88; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Фото-Хостинг</h2>
    
    <!-- Секция входа -->
    <div id="auth-section">
        <button class="google-btn" onclick="mockLogin()">Войти через Google</button>
    </div>

    <!-- Секция загрузки -->
    <div id="main-content" style="display:none;">
        <p>Привет, <span id="user-name">Юзер</span>!</p>
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadBtn" class="btn" onclick="uploadImage()">Сгенерировать HTML-код</button>
        
        <div id="loader">Загрузка в облако... ⏳</div>

        <textarea id="resultCode" readonly></textarea>
        <button id="copyBtn" class="copy-btn" onclick="copyCode()">Копировать HTML-код</button>
    </div>
</div>

<script>
    // Имитация входа (для реального нужен Firebase API)
    function mockLogin() {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-name').innerText = 'Друг';
    }

    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0]; // Берем ровно ОДИН файл
        const uploadBtn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        
        if (!file) {
            alert('Ошибка: Выбери картинку!');
            return;
        }

        // Подготовка данных
        const formData = new FormData();
        formData.append('image', file);

        // Настройки API (ImgBB)
        const apiKey = '639f77f0f6797818e32717013854d99c'; 
        
        // Визуал загрузки
        uploadBtn.disabled = true;
        loader.style.display = 'block';

        try {
            const response = await fetch(`https://imgbb.com{apiKey}`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                const imageUrl = data.data.url;
                // Формируем ту самую строку кода
                const htmlCode = `<img src="${imageUrl}" alt="AI Image" border="0">`;
                
                const area = document.getElementById('resultCode');
                area.value = htmlCode;
                area.style.display = 'block';
                document.getElementById('copyBtn').style.display = 'block';
            } else {
                alert('Ошибка API: ' + data.error.message);
            }
        } catch (err) {
            alert('Ошибка сети! Проверь интернет или API ключ.');
        } finally {
            uploadBtn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function copyCode() {
        const area = document.getElementById('resultCode');
        area.select();
        document.execCommand('copy');
        alert('Код скопирован! Вставляй его в свой HTML.');
    }
</script>

</body>
</html>
