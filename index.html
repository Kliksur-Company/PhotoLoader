<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор HTML-кода фото</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; }
        input[type="file"] { margin: 20px 0; }
        #resultCode { width: 100%; height: 80px; background: #000; color: #0f0; border: none; padding: 10px; margin-top: 20px; display: none; }
        .copy-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Загрузи фото — получи HTML-код</h2>
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="uploadImage()" class="btn">Создать код</button>

    <textarea id="resultCode" readonly></textarea>
    <br>
    <button id="copyBtn" class="copy-btn" onclick="copyCode()">Копировать код</button>
</div>

<script>
    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        if (!file) return alert('Сначала выбери файл!');

        const formData = new FormData();
        formData.append('image', file);

        // Используем бесплатный API ImgBB (это временный ключ, лучше заведи свой)
        const apiKey = '639f77f0f6797818e32717013854d99c'; 
        
        try {
            const response = await fetch(`https://imgbb.com{apiKey}`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            const imageUrl = data.data.url;

            // Генерируем строку кода
            const htmlCode = `<img src="${imageUrl}" alt="Uploaded Image" border="0">`;
            
            const area = document.getElementById('resultCode');
            area.value = htmlCode;
            area.style.display = 'block';
            document.getElementById('copyBtn').style.display = 'inline-block';
        } catch (err) {
            alert('Ошибка загрузки!');
        }
    }

    function copyCode() {
        const area = document.getElementById('resultCode');
        area.select();
        document.execCommand('copy');
        alert('Код скопирован!');
    }
</script>

</body>
</html>
